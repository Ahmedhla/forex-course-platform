version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: forex-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: forex_course_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: forex-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/forex_course_db?useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: Maher2019.
      JWT_SECRET: mySuperSecretKeyForJWTTokenGeneration2024!
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

volumes:
  mysql-data:
  uploads-data: