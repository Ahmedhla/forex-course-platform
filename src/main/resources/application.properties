# Database Configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:forexdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT Configuration
jwt.secret=${JWT_SECRET:MySuperSecretKeyForJWT2024ForexPlatform!@#$%^}
jwt.expiration=86400000

# File Upload Paths
video.upload.path=./uploads/videos/
thumbnail.upload.path=./uploads/thumbnails/

# Static Resource Serving for PDFs
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.web.resources.add-mappings=true

# File Upload Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Server Configuration
server.port=${PORT:8080}