# ============================================
# DATABASE CONFIGURATION
# ============================================

# PostgreSQL for Production (Render) - Uses environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:forexdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================

jwt.secret=${JWT_SECRET:MySuperSecretKeyForJWT2024ForexPlatform!@#$%^}
jwt.expiration=86400000

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================

video.upload.path=./uploads/videos/
thumbnail.upload.path=./uploads/thumbnails/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ============================================
# SERVER CONFIGURATION
# ============================================

server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# ============================================
# EMAIL CONFIGURATION (Gmail SMTP)
# ============================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================
# APPLICATION BASE URL (for password reset links)
# ============================================

app.base.url=${APP_BASE_URL:http://localhost:8080}

# ============================================
# LOGGING
# ============================================

logging.level.org.springframework.security=INFO
logging.level.com.forex=DEBUG
logging.level.org.springframework.mail=DEBUG