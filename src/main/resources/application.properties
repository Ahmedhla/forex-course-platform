# ============================================
# DATABASE CONFIGURATION
# ============================================

# PostgreSQL for Production (Render) - Uses environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:forexdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================

jwt.secret=${JWT_SECRET:MySuperSecretKeyForJWT2024ForexPlatform!@#$%^}
jwt.expiration=86400000

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================

video.upload.path=./uploads/videos/
thumbnail.upload.path=./uploads/thumbnails/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ============================================
# SERVER CONFIGURATION
# ============================================

server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# ============================================
# EMAIL CONFIGURATION (Gmail SMTP with SSL)
# ============================================

# Basic SMTP settings - Using Port 465 with SSL
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:asmursa@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtps
spring.mail.default-encoding=UTF-8

# SSL Configuration
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.ssl.enable=true
spring.mail.properties.mail.smtps.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtps.starttls.enable=true

# Timeout settings
spring.mail.properties.mail.smtps.timeout=15000
spring.mail.properties.mail.smtps.connectiontimeout=15000
spring.mail.properties.mail.smtps.writetimeout=15000

# Disable SSL strict checking (helps with some cloud providers)
spring.mail.properties.mail.smtps.ssl.checkserveridentity=false

# Debug mode (set to false in production)
spring.mail.properties.mail.debug=true

# Additional socket properties
spring.mail.properties.mail.smtps.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtps.socketFactory.port=465
spring.mail.properties.mail.smtps.socketFactory.fallback=false

# ============================================
# APPLICATION BASE URL (for password reset links)
# ============================================

app.base.url=${APP_BASE_URL:http://localhost:8080}

# ============================================
# LOGGING
# ============================================

logging.level.org.springframework.security=INFO
logging.level.com.forex=DEBUG
logging.level.org.springframework.mail=DEBUG