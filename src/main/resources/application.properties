# Default configuration (used by Render)
spring.datasource.url=${DB_URL:jdbc:h2:mem:forexdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

jwt.secret=${JWT_SECRET:MySuperSecretKeyForJWT2024ForexPlatform!@#$%^}
jwt.expiration=86400000

video.upload.path=./uploads/videos/
thumbnail.upload.path=./uploads/thumbnails/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

server.port=${PORT:8080}