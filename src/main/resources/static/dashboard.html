<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Forex Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 1rem 0; }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #ffd700; }
        .nav-links { display: flex; align-items: center; gap: 2rem; }
        .nav-links a { color: white; text-decoration: none; }

        .profile-container { position: relative; display: inline-block; }
        .profile-btn { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); border: none; padding: 8px 15px; border-radius: 40px; cursor: pointer; color: white; }
        .profile-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #ffd700, #ff8c00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
        .profile-dropdown { position: absolute; top: 100%; right: 0; margin-top: 10px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); min-width: 280px; display: none; overflow: hidden; z-index: 1001; }
        .profile-dropdown.show { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-header { padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-align: center; }
        .dropdown-avatar { width: 60px; height: 60px; background: #ffd700; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; color: #333; }
        .dropdown-name { font-weight: bold; font-size: 16px; }
        .dropdown-email { font-size: 12px; opacity: 0.8; }
        .dropdown-role { display: inline-block; margin-top: 8px; padding: 4px 10px; background: rgba(255,255,255,0.2); border-radius: 20px; font-size: 11px; }
        .dropdown-divider { height: 1px; background: #eee; }
        .dropdown-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #333; text-decoration: none; cursor: pointer; }
        .dropdown-item:hover { background: #f5f5f5; }
        .dropdown-logout { color: #dc3545; border-top: 1px solid #eee; }

        .hamburger { display: none; flex-direction: column; cursor: pointer; background: none; border: none; padding: 10px; }
        .hamburger span { width: 25px; height: 3px; background: white; margin: 3px 0; transition: 0.3s; border-radius: 2px; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        .mobile-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .mobile-menu a { color: white; text-decoration: none; font-size: 1.5rem; padding: 15px; }
        .close-menu { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; background: none; border: none; }
        .mobile-profile { text-align: center; margin-bottom: 20px; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: white; padding: 30px; text-align: center; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card h3 { font-size: 2rem; color: #28a745; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .course-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s; cursor: pointer; }
        .course-card:hover { transform: translateY(-5px); }
        .thumbnail-container { width: 100%; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 48px; color: white; }
        .course-card img { width: 100%; height: 200px; object-fit: cover; }
        .course-card h3 { padding: 15px; }
        .btn-primary { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin: 15px; width: calc(100% - 30px); cursor: pointer; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .courses-grid { grid-template-columns: 1fr; }
            .profile-name { display: none; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="logo">📈 <span>Forex</span>Academy</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="admin.html" id="adminLink" style="display:none;">Admin</a>
            <div id="profileContainer" class="profile-container" style="display:none;">
                <button class="profile-btn" id="profileBtn">
                    <div class="profile-avatar" id="profileAvatar">U</div>
                    <span class="profile-name" id="profileName">User</span>
                    <span>▼</span>
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-avatar" id="dropdownAvatar">U</div>
                        <div class="dropdown-name" id="dropdownName">User Name</div>
                        <div class="dropdown-email" id="dropdownEmail">user@example.com</div>
                        <div class="dropdown-role" id="dropdownRole">STUDENT</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="dashboard.html" class="dropdown-item">📚 My Dashboard</a>
                    <a href="admin.html" class="dropdown-item" id="dropdownAdmin" style="display:none;">⚙️ Admin Panel</a>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item dropdown-logout" id="dropdownLogout">🚪 Logout</div>
                </div>
            </div>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
        <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-menu" id="closeMenuBtn">&times;</button>
    <div id="mobileProfile" class="mobile-profile" style="display:none;">
        <div class="dropdown-avatar" id="mobileAvatar" style="margin:0 auto 10px;">U</div>
        <div style="font-size:18px;font-weight:bold" id="mobileName">User Name</div>
        <div style="font-size:12px;opacity:0.8" id="mobileEmail">user@example.com</div>
        <div style="margin-top:8px"><span class="dropdown-role" id="mobileRole">STUDENT</span></div>
    </div>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html" id="mobileAdminLink" style="display:none;">Admin</a>
    <a href="#" id="mobileLogoutBtn" style="color:#ff6b6b;">Logout</a>
</div>

<div class="container">
    <h1>📚 My Dashboard</h1>
    <div class="stats"><div class="stat-card"><h3 id="enrolledCount">0</h3><p>Free Courses Available</p></div></div>
    <h2>All Free Courses</h2>
    <div id="myCourses" class="courses-grid"></div>
</div>

<script>
    const API_BASE = '/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    // Profile Menu Functions
    let currentUser = { fullName: localStorage.getItem('fullName') || 'User', email: '', role: localStorage.getItem('role') || 'STUDENT' };

    async function fetchCurrentUser() {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const response = await fetch(`${API_BASE}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (response.ok) {
                const user = await response.json();
                currentUser = { fullName: user.fullName, email: user.email, role: user.role };
                localStorage.setItem('fullName', currentUser.fullName);
                localStorage.setItem('role', currentUser.role);
            }
        } catch (error) { console.error('Error fetching user:', error); }
    }

    function updateProfileUI() {
        const fullName = currentUser.fullName || 'User';
        const email = currentUser.email || 'user@example.com';
        const role = currentUser.role || 'STUDENT';
        const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        const profileAvatar = document.getElementById('profileAvatar');
        const dropdownAvatar = document.getElementById('dropdownAvatar');
        const mobileAvatar = document.getElementById('mobileAvatar');
        if (profileAvatar) profileAvatar.textContent = initials;
        if (dropdownAvatar) dropdownAvatar.textContent = initials;
        if (mobileAvatar) mobileAvatar.textContent = initials;
        const profileName = document.getElementById('profileName');
        if (profileName) profileName.textContent = fullName.split(' ')[0];
        const dropdownName = document.getElementById('dropdownName');
        if (dropdownName) dropdownName.textContent = fullName;
        const dropdownEmail = document.getElementById('dropdownEmail');
        if (dropdownEmail) dropdownEmail.textContent = email;
        const dropdownRole = document.getElementById('dropdownRole');
        if (dropdownRole) dropdownRole.textContent = role;
        const mobileName = document.getElementById('mobileName');
        if (mobileName) mobileName.textContent = fullName;
        const mobileEmail = document.getElementById('mobileEmail');
        if (mobileEmail) mobileEmail.textContent = email;
        const mobileRole = document.getElementById('mobileRole');
        if (mobileRole) mobileRole.textContent = role;
        const dropdownAdmin = document.getElementById('dropdownAdmin');
        if (dropdownAdmin) dropdownAdmin.style.display = role === 'ADMIN' ? 'block' : 'none';
    }

    function initProfileMenu() {
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', (e) => { e.stopPropagation(); profileDropdown.classList.toggle('show'); });
            document.addEventListener('click', (e) => {
                if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) profileDropdown.classList.remove('show');
            });
        }
    }

    async function handleLogout() {
        try {
            const token = localStorage.getItem('token');
            if (token) await fetch(`${API_BASE}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
        } catch (error) { console.error('Logout error:', error); }
        finally { localStorage.clear(); window.location.href = 'index.html'; }
    }

    // Hamburger menu
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const closeMenuBtn = document.getElementById('closeMenuBtn');

    function closeMobileMenu() {
        if (hamburgerBtn) hamburgerBtn.classList.remove('active');
        if (mobileMenu) mobileMenu.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
    function openMobileMenu() {
        if (hamburgerBtn) hamburgerBtn.classList.add('active');
        if (mobileMenu) mobileMenu.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    if (hamburgerBtn) hamburgerBtn.addEventListener('click', openMobileMenu);
    if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMobileMenu);

    function goToCoursePlayer(courseId) { window.location.href = `course-player.html?courseId=${courseId}`; }
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    async function loadDashboard() {
        try {
            const response = await fetch(`${API_BASE}/courses/my-courses`, { headers: { 'Authorization': `Bearer ${token}` } });
            const courses = await response.json();
            document.getElementById('enrolledCount').innerText = courses.length;
            const container = document.getElementById('myCourses');
            if (courses.length === 0) { container.innerHTML = '<p style="text-align:center;padding:40px;">No courses available.</p>'; return; }
            container.innerHTML = courses.map(course => {
                let thumbnailHtml = course.thumbnailUrl ? `<img src="${course.thumbnailUrl}" alt="${course.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : '';
                thumbnailHtml += `<div class="thumbnail-container" style="${course.thumbnailUrl ? 'display:none' : ''}">🎓 FREE</div>`;
                return `<div class="course-card" onclick="goToCoursePlayer(${course.id})">${thumbnailHtml}<h3>${escapeHtml(course.title)}</h3><button class="btn-primary">▶ Start Learning</button></div>`;
            }).join('');
        } catch (error) { console.error('Error:', error); }
    }

    async function updateNavigation() {
        const role = localStorage.getItem('role');
        const adminLink = document.getElementById('adminLink');
        const mobileAdminLink = document.getElementById('mobileAdminLink');
        if (role === 'ADMIN') {
            if (adminLink) adminLink.style.display = 'inline-block';
            if (mobileAdminLink) mobileAdminLink.style.display = 'block';
        }
        await fetchCurrentUser();
        updateProfileUI();
        initProfileMenu();
        const dropdownLogout = document.getElementById('dropdownLogout');
        if (dropdownLogout) dropdownLogout.addEventListener('click', handleLogout);
        const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
        if (mobileLogoutBtn) mobileLogoutBtn.addEventListener('click', handleLogout);
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) logoutBtn.addEventListener('click', handleLogout);
    }

    updateNavigation();
    loadDashboard();
</script>
</body>
</html>
