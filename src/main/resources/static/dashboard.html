<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Forex Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 1rem 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
        }
        .nav-links a:hover {
            color: #ffd700;
        }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .course-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }
        .course-card:hover {
            transform: translateY(-5px);
        }
        .thumbnail-container {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }
        .course-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .course-card h3 {
            padding: 15px;
            font-size: 1.2rem;
        }
        .course-card p {
            padding: 0 15px;
            color: #666;
        }
        .btn-primary {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin: 15px;
            width: calc(100% - 30px);
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background: #218838;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            font-size: 2rem;
            color: #28a745;
        }
        h1 {
            margin-top: 20px;
            color: #333;
        }
        h2 {
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="logo">📈 ForexAcademy</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">My Courses</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1>📚 My Dashboard</h1>
    <div class="stats">
        <div class="stat-card">
            <h3 id="enrolledCount">0</h3>
            <p>Free Courses Available</p>
        </div>
    </div>

    <h2>All Free Courses</h2>
    <div id="myCourses" class="courses-grid"></div>
</div>

<script>
    const API_BASE = '/api';
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = 'index.html';
    }

    document.getElementById('logoutBtn').onclick = () => {
        localStorage.clear();
        window.location.href = 'index.html';
    };

    function goToCoursePlayer(courseId) {
        window.location.href = `course-player.html?courseId=${courseId}`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadDashboard() {
        try {
            const response = await fetch(`${API_BASE}/courses/my-courses`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const courses = await response.json();
            document.getElementById('enrolledCount').innerText = courses.length;

            const container = document.getElementById('myCourses');
            if (courses.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No courses available yet. Check back later!</p>';
                return;
            }

            container.innerHTML = courses.map(course => {
                let thumbnailHtml = '';
                if (course.thumbnailUrl && course.thumbnailUrl !== '') {
                    thumbnailHtml = `<img src="${course.thumbnailUrl}" alt="${course.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
                    thumbnailHtml += `<div class="thumbnail-container" style="display: none;">📈</div>`;
                } else {
                    thumbnailHtml = `<div class="thumbnail-container">🎓 FREE COURSE</div>`;
                }

                return `
                        <div class="course-card">
                            ${thumbnailHtml}
                            <h3>${escapeHtml(course.title)}</h3>
                            <p>${escapeHtml(course.description?.substring(0, 80) || 'Click to start learning')}</p>
                            <button class="btn-primary" onclick="goToCoursePlayer(${course.id})">
                                ▶ Start Learning
                            </button>
                        </div>
                    `;
            }).join('');
        } catch (error) {
            console.error('Error loading dashboard:', error);
            document.getElementById('myCourses').innerHTML = '<p style="text-align:center; padding:40px;">Error loading courses. Please refresh.</p>';
        }
    }

    loadDashboard();
</script>
</body>
</html>
