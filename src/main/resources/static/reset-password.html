<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reset Password - Forex Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 1.5rem;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #218838;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }

        .strength-weak { color: #dc3545; }
        .strength-medium { color: #ffc107; }
        .strength-strong { color: #28a745; }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">📈 ForexAcademy</div>
    <h1>Reset Password</h1>
    <p class="description">Enter your new password below.</p>

    <div class="input-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password">
        <div class="requirements">Password must be at least 6 characters long.</div>
        <div class="password-strength" id="passwordStrength"></div>
    </div>

    <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password">
    </div>

    <button onclick="resetPassword()" id="resetBtn">Reset Password</button>

    <div id="message"></div>

    <div class="back-link">
        <a href="index.html">← Back to Login</a>
    </div>
</div>

<script>
    const API_BASE = '/api';
    const resetBtn = document.getElementById('resetBtn');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Password strength checker
    function checkPasswordStrength(password) {
        if (!password) return '';

        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^a-zA-Z0-9]/)) strength++;

        if (strength <= 2) return '<span class="strength-weak">Weak password</span>';
        if (strength <= 4) return '<span class="strength-medium">Medium password</span>';
        return '<span class="strength-strong">Strong password</span>';
    }

    newPassword.addEventListener('input', function() {
        const strengthHtml = checkPasswordStrength(this.value);
        document.getElementById('passwordStrength').innerHTML = strengthHtml;
    });

    // Validate token on page load
    async function validateToken() {
        if (!token) {
            showMessage('Invalid reset link. Please request a new password reset.', 'error');
            resetBtn.disabled = true;
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/auth/validate-reset-token?token=${token}`);
            const data = await response.json();

            if (!response.ok || !data.valid) {
                showMessage(data.error || 'Invalid or expired reset link. Please request a new password reset.', 'error');
                resetBtn.disabled = true;
            } else {
                showMessage('✅ Valid reset link. Enter your new password below.', 'info');
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('Error validating reset link. Please try again.', 'error');
            resetBtn.disabled = true;
        }
    }

    function showMessage(msg, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;

        // Auto scroll to message
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function resetPassword() {
        const newPass = newPassword.value;
        const confirmPass = confirmPassword.value;

        // Clear previous message
        document.getElementById('message').innerHTML = '';

        if (!token) {
            showMessage('Invalid reset link. Please request a new password reset.', 'error');
            return;
        }

        if (!newPass || !confirmPass) {
            showMessage('Please fill in both password fields.', 'error');
            return;
        }

        if (newPass.length < 6) {
            showMessage('Password must be at least 6 characters long.', 'error');
            newPassword.focus();
            return;
        }

        if (newPass !== confirmPass) {
            showMessage('Passwords do not match.', 'error');
            confirmPassword.focus();
            return;
        }

        // Disable button during request
        resetBtn.disabled = true;
        resetBtn.textContent = 'Resetting...';

        showMessage('Resetting password...', 'info');

        try {
            const response = await fetch(`${API_BASE}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: token,
                    newPassword: newPass
                })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('✅ ' + data.message, 'success');
                // Clear password fields
                newPassword.value = '';
                confirmPassword.value = '';
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            } else {
                showMessage('❌ ' + (data.error || 'Something went wrong. Please try again.'), 'error');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('❌ Network error. Please check your connection and try again.', 'error');
            resetBtn.disabled = false;
            resetBtn.textContent = 'Reset Password';
        }
    }

    // Allow Enter key to submit
    confirmPassword.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !resetBtn.disabled) {
            resetPassword();
        }
    });

    // Validate token on page load
    validateToken();
</script>
</body>
</html>
