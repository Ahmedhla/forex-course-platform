<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Forex Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 1rem 0;
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
        }
        .nav-links a:hover {
            color: #ffd700;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        .mobile-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 15px;
        }
        .close-menu {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Admin Panel Styles */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #ddd;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .admin-course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-secondary {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-success {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-primary {
            background: #007bff;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        form input, form textarea, form select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .video-item {
            padding: 10px;
            margin: 10px 0;
            background: #f5f5f5;
            border-radius: 5px;
        }

        /* User Table Styles */
        .user-table {
            width: 100%;
            border-collapse: collapse;
        }
        .user-table th, .user-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .user-table th {
            background: #667eea;
            color: white;
        }
        .user-table tr:hover {
            background: #f5f5f5;
        }
        .role-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .role-admin {
            background: #dc3545;
            color: white;
        }
        .role-student {
            background: #28a745;
            color: white;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            font-size: 1.8rem;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .admin-tabs {
                flex-direction: column;
            }
            .tab-btn {
                width: 100%;
            }
            .user-table, .user-table thead, .user-table tbody, .user-table th, .user-table td, .user-table tr {
                display: block;
            }
            .user-table th {
                display: none;
            }
            .user-table td {
                display: flex;
                justify-content: space-between;
                padding: 10px;
            }
            .user-table td::before {
                content: attr(data-label);
                font-weight: bold;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="logo">📈 ForexAcademy - Admin</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
        <button class="hamburger" id="hamburgerBtn">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-menu" id="closeMenuBtn">&times;</button>
    <a href="index.html">Home</a>
    <a href="#" id="mobileLogoutBtn">Logout</a>
</div>

<div class="container">
    <h1>Admin Panel</h1>

    <div class="admin-tabs">
        <button class="tab-btn active" onclick="showTab('courses')">Manage Courses</button>
        <button class="tab-btn" onclick="showTab('addCourse')">Add New Course</button>
        <button class="tab-btn" onclick="showTab('users')">👥 Manage Users</button>
    </div>

    <!-- Manage Courses Tab -->
    <div id="coursesTab" class="tab-content active">
        <h2>All Courses</h2>
        <div id="coursesList">Loading...</div>
    </div>

    <!-- Add Course Tab -->
    <div id="addCourseTab" class="tab-content" style="display:none;">
        <h2>Add New Course</h2>
        <form id="courseForm">
            <input type="text" id="courseTitle" placeholder="Course Title" required>
            <textarea id="courseDesc" placeholder="Course Description" rows="4"></textarea>
            <input type="file" id="courseThumbnail" accept="image/jpeg,image/png,image/jpg">
            <button type="submit" class="btn-success">Create Free Course</button>
        </form>

        <div id="videoSection" style="display:none; margin-top: 30px;">
            <h3>Add YouTube Videos to Course</h3>
            <select id="courseSelect"></select>
            <form id="videoForm">
                <input type="text" id="videoTitle" placeholder="Video Title" required>
                <textarea id="videoDesc" placeholder="Video Description" rows="3"></textarea>
                <input type="text" id="youtubeUrl" placeholder="YouTube URL or Video ID" required>
                <input type="number" id="videoDuration" placeholder="Duration in seconds" step="1">
                <button type="submit" class="btn-success">Add YouTube Video</button>
            </form>
            <div id="videoList"></div>
        </div>
    </div>

    <!-- Manage Users Tab -->
    <div id="usersTab" class="tab-content" style="display:none;">
        <h2>👥 User Management</h2>

        <div class="stats" id="stats">
            <div class="stat-card">
                <h3 id="totalUsers">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="totalAdmins">0</h3>
                <p>Admins</p>
            </div>
            <div class="stat-card">
                <h3 id="totalStudents">0</h3>
                <p>Students</p>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by email or name..." onkeyup="searchUsers()">
            <button class="btn-primary" onclick="searchUsers()">🔍 Search</button>
            <button class="btn-success" onclick="exportUsers()">📥 Export CSV</button>
            <button class="btn-secondary" onclick="fetchUsers()">🔄 Refresh</button>
        </div>

        <div id="userMessage" class="message" style="display:none;"></div>

        <table class="user-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Registered</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="userTableBody">
            <tr><td colspan="6">Loading users...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = '/api';
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token || role !== 'ADMIN') {
        window.location.href = 'index.html';
    }

    // Hamburger menu
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const closeMenuBtn = document.getElementById('closeMenuBtn');

    function closeMobileMenu() {
        if (hamburgerBtn) hamburgerBtn.classList.remove('active');
        if (mobileMenu) mobileMenu.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function openMobileMenu() {
        if (hamburgerBtn) hamburgerBtn.classList.add('active');
        if (mobileMenu) mobileMenu.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    if (hamburgerBtn) hamburgerBtn.addEventListener('click', openMobileMenu);
    if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMobileMenu);
    if (mobileMenu) {
        mobileMenu.addEventListener('click', (e) => {
            if (e.target === mobileMenu) closeMobileMenu();
        });
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    document.getElementById('logoutBtn').onclick = logout;
    const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
    if (mobileLogoutBtn) mobileLogoutBtn.onclick = logout;

    function showTab(tab) {
        document.getElementById('coursesTab').style.display = tab === 'courses' ? 'block' : 'none';
        document.getElementById('addCourseTab').style.display = tab === 'addCourse' ? 'block' : 'none';
        document.getElementById('usersTab').style.display = tab === 'users' ? 'block' : 'none';

        if (tab === 'courses') loadCourses();
        if (tab === 'users') fetchUsers();
    }

    // ============================================
    // COURSE MANAGEMENT
    // ============================================

    async function loadCourses() {
        try {
            const response = await fetch(`${API_BASE}/admin/courses`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const courses = await response.json();
            const container = document.getElementById('coursesList');

            if (courses.length === 0) {
                container.innerHTML = '<p>No courses yet.</p>';
                return;
            }

            container.innerHTML = courses.map(course => `
                    <div class="admin-course-item">
                        <div><strong>${escapeHtml(course.title)}</strong><br>FREE | ${course.videos?.length || 0} videos</div>
                        <div>
                            <button onclick="viewCourseVideos(${course.id})" class="btn-secondary">View Videos</button>
                            <button onclick="deleteCourse(${course.id})" class="btn-danger">Delete Course</button>
                        </div>
                    </div>
                `).join('');
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function deleteCourse(courseId) {
        if (confirm('Delete this course? ALL videos will be deleted!')) {
            try {
                await fetch(`${API_BASE}/admin/courses/${courseId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                alert('Course deleted');
                await loadCourses();
                await loadCourseSelect();
            } catch (error) {
                alert('Error deleting course');
            }
        }
    }

    async function deleteVideo(videoId, courseId) {
        if (!confirm('Delete this video?')) return;
        try {
            await fetch(`${API_BASE}/admin/videos/${videoId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            alert('Video deleted');
            await loadCourseVideos(courseId);
            await loadCourses();
        } catch (error) {
            alert('Error deleting video');
        }
    }

    async function viewCourseVideos(courseId) {
        await loadCourseVideos(courseId);
    }

    async function loadCourseVideos(courseId) {
        try {
            const response = await fetch(`${API_BASE}/admin/courses/${courseId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const course = await response.json();
            const videoListDiv = document.getElementById('videoList');

            if (!course.videos || course.videos.length === 0) {
                videoListDiv.innerHTML = '<p>No videos yet.</p>';
                return;
            }

            videoListDiv.innerHTML = '<h4>YouTube Videos:</h4>';
            course.videos.forEach(video => {
                const minutes = video.duration ? Math.floor(video.duration / 60) : '?';
                const seconds = video.duration ? video.duration % 60 : '?';
                videoListDiv.innerHTML += `
                        <div class="video-item">
                            <strong>${escapeHtml(video.title)}</strong><br>
                            Duration: ${minutes}:${seconds}<br>
                            URL: ${escapeHtml(video.videoUrl)}<br>
                            <button onclick="deleteVideo(${video.id}, ${courseId})" class="btn-danger">Delete Video</button>
                        </div>
                    `;
            });

            document.getElementById('courseSelect').value = courseId;
            document.getElementById('videoSection').style.display = 'block';
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function loadCourseSelect() {
        const response = await fetch(`${API_BASE}/admin/courses`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const courses = await response.json();
        const select = document.getElementById('courseSelect');
        select.innerHTML = '<option value="">Select a course</option>';
        courses.forEach(course => {
            select.innerHTML += `<option value="${course.id}">${escapeHtml(course.title)}</option>`;
        });
    }

    document.getElementById('courseForm').onsubmit = async (e) => {
        e.preventDefault();
        const course = {
            title: document.getElementById('courseTitle').value,
            description: document.getElementById('courseDesc').value,
            price: 0
        };
        const thumbnail = document.getElementById('courseThumbnail').files[0];

        try {
            let thumbnailUrl = null;
            if (thumbnail) {
                const formData = new FormData();
                formData.append('file', thumbnail);
                const uploadResponse = await fetch(`${API_BASE}/admin/upload/thumbnail`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const uploadResult = await uploadResponse.json();
                if (uploadResult.thumbnailUrl) thumbnailUrl = uploadResult.thumbnailUrl;
            }
            if (thumbnailUrl) course.thumbnailUrl = thumbnailUrl;

            const createResponse = await fetch(`${API_BASE}/admin/courses`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(course)
            });
            const result = await createResponse.json();
            alert(`Course created!`);
            document.getElementById('courseForm').reset();
            document.getElementById('videoSection').style.display = 'block';
            await loadCourseSelect();
            await loadCourses();
        } catch (error) {
            alert('Error creating course');
        }
    };

    document.getElementById('videoForm').onsubmit = async (e) => {
        e.preventDefault();
        const courseId = document.getElementById('courseSelect').value;
        if (!courseId) { alert('Select a course'); return; }

        const videoData = {
            title: document.getElementById('videoTitle').value,
            description: document.getElementById('videoDesc').value,
            videoUrl: document.getElementById('youtubeUrl').value,
            duration: parseInt(document.getElementById('videoDuration').value) || 0
        };

        try {
            const addResponse = await fetch(`${API_BASE}/admin/courses/${courseId}/videos`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(videoData)
            });
            if (addResponse.ok) {
                alert('YouTube video added!');
                document.getElementById('videoForm').reset();
                await loadCourseVideos(courseId);
                await loadCourses();
            } else {
                alert('Error adding video');
            }
        } catch (error) {
            alert('Error adding video');
        }
    };

    // ============================================
    // USER MANAGEMENT
    // ============================================

    let allUsers = [];

    async function fetchUsers() {
        try {
            const response = await fetch(`${API_BASE}/admin/users`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) throw new Error('Failed to fetch users');

            const users = await response.json();
            allUsers = users;
            updateStats(users);
            displayUsers(users);
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('userTableBody').innerHTML = '<tr><td colspan="6">Error loading users</td></tr>';
        }
    }

    function updateStats(users) {
        const totalUsers = users.length;
        const admins = users.filter(u => u.role === 'ADMIN').length;
        const students = users.filter(u => u.role === 'STUDENT').length;

        document.getElementById('totalUsers').innerText = totalUsers;
        document.getElementById('totalAdmins').innerText = admins;
        document.getElementById('totalStudents').innerText = students;
    }

    function displayUsers(users) {
        const tbody = document.getElementById('userTableBody');

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">No users found</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(user => `
                <tr>
                    <td data-label="ID">${user.id}</td>
                    <td data-label="Email">${escapeHtml(user.email)}</td>
                    <td data-label="Full Name">${escapeHtml(user.fullName)}</td>
                    <td data-label="Role">
                        <span class="role-badge role-${user.role.toLowerCase()}">${user.role}</span>
                    </td>
                    <td data-label="Registered">${formatDate(user.createdAt)}</td>
                    <td data-label="Actions">
                        ${user.role !== 'ADMIN' ?
            `<button class="btn-primary" onclick="makeAdmin(${user.id})">Make Admin</button>` :
            `<button class="btn-danger" onclick="removeAdmin(${user.id})">Remove Admin</button>`
        }
                    </td>
                </tr>
            `).join('');
    }

    function searchUsers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allUsers.filter(user =>
            user.email.toLowerCase().includes(searchTerm) ||
            user.fullName.toLowerCase().includes(searchTerm)
        );
        displayUsers(filtered);
    }

    async function makeAdmin(userId) {
        if (!confirm('Make this user an admin?')) return;

        try {
            const response = await fetch(`${API_BASE}/admin/users/${userId}/make-admin`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                showUserMessage('User is now an admin!', 'success');
                fetchUsers();
            } else {
                showUserMessage('Failed to make user admin', 'error');
            }
        } catch (error) {
            showUserMessage('Error: ' + error.message, 'error');
        }
    }

    async function removeAdmin(userId) {
        if (!confirm('Remove admin role from this user?')) return;

        try {
            const response = await fetch(`${API_BASE}/admin/users/${userId}/remove-admin`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                showUserMessage('Admin role removed', 'success');
                fetchUsers();
            } else {
                showUserMessage('Failed to remove admin role', 'error');
            }
        } catch (error) {
            showUserMessage('Error: ' + error.message, 'error');
        }
    }

    function exportUsers() {
        if (allUsers.length === 0) {
            showUserMessage('No users to export', 'error');
            return;
        }

        const headers = ['ID', 'Email', 'Full Name', 'Role', 'Registered Date'];
        const rows = allUsers.map(user => [
            user.id,
            user.email,
            user.fullName,
            user.role,
            user.createdAt || 'N/A'
        ]);

        const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');

        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `users_export_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showUserMessage('Users exported successfully!', 'success');
    }

    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        return date.toLocaleDateString();
    }

    function showUserMessage(msg, type) {
        const messageDiv = document.getElementById('userMessage');
        messageDiv.style.display = 'block';
        messageDiv.className = `message ${type}`;
        messageDiv.innerHTML = msg;
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Initial load
    loadCourses();
    loadCourseSelect();
</script>
</body>
</html>
