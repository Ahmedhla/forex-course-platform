<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Forgot Password - Forex Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 1.5rem;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .test-link {
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-size: 12px;
            word-break: break-all;
        }

        .test-link a {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">📈 ForexAcademy</div>
    <h1>Forgot Password?</h1>
    <p class="description">Enter your email address and we'll send you a link to reset your password.</p>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <button onclick="sendResetLink()" id="submitBtn">Send Reset Link</button>

    <div id="message"></div>

    <div class="back-link">
        <a href="index.html">← Back to Login</a>
    </div>
</div>

<script>
    const API_BASE = '/api';
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('email');

    async function sendResetLink() {
        const email = emailInput.value.trim();
        const messageDiv = document.getElementById('message');

        // Clear previous message
        messageDiv.innerHTML = '';

        // Validate email
        if (!email) {
            showMessage('Please enter your email address.', 'error');
            emailInput.focus();
            return;
        }

        // Email format validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showMessage('Please enter a valid email address.', 'error');
            emailInput.focus();
            return;
        }

        // Disable button during request
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        showMessage('Sending reset link...', 'info');

        try {
            const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('✅ ' + data.message, 'success');
                emailInput.value = '';

                // Show test link (remove in production)
                if (data.resetLink) {
                    const testLinkDiv = document.createElement('div');
                    testLinkDiv.className = 'test-link';
                    testLinkDiv.innerHTML = '🔗 <strong>Test Link (Remove in Production):</strong><br><a href="' + data.resetLink + '" target="_blank">' + data.resetLink + '</a>';
                    messageDiv.appendChild(testLinkDiv);
                }
            } else {
                showMessage('❌ ' + (data.error || 'Something went wrong. Please try again.'), 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('❌ Network error. Please check your connection and try again.', 'error');
        } finally {
            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Reset Link';
        }
    }

    function showMessage(msg, type) {
        const messageDiv = document.getElementById('message');
        const messageElement = document.createElement('div');
        messageElement.className = `message ${type}`;
        messageElement.innerHTML = msg;
        messageDiv.appendChild(messageElement);

        // Auto scroll to message
        messageElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Allow Enter key to submit
    emailInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !submitBtn.disabled) {
            sendResetLink();
        }
    });

    // Auto-focus on email input
    emailInput.focus();
</script>
</body>
</html>
