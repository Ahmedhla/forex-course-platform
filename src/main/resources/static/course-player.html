<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Player - Forex Academy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    .navbar {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 1rem 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 2rem;
    }
    .player-container {
      display: flex;
      max-width: 1400px;
      margin: 20px auto;
      gap: 20px;
      padding: 0 20px;
    }
    .video-section {
      flex: 2;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      background: black;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-info {
      margin-top: 15px;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }
    .playlist-section {
      flex: 1;
      background: white;
      border-radius: 10px;
      padding: 20px;
      max-height: 600px;
      overflow-y: auto;
    }
    .playlist-item {
      display: flex;
      padding: 12px;
      margin: 10px 0;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .playlist-item:hover {
      background: #e8e8e8;
    }
    .playlist-item.active {
      background: #667eea;
      color: white;
    }
    .playlist-thumb {
      width: 50px;
      height: 50px;
      background: #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 24px;
    }
    .playlist-info {
      flex: 1;
    }
    .playlist-title {
      font-weight: bold;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .pdf-material {
      margin-top: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      display: none;
    }
    @media (max-width: 768px) {
      .player-container {
        flex-direction: column;
      }
      .nav-links a {
        margin-left: 1rem;
      }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="logo">📈 ForexAcademy</div>
    <div class="nav-links">
      <a href="dashboard.html">My Courses</a>
      <a href="index.html">Home</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>
</nav>

<div class="player-container">
  <div class="video-section">
    <div class="video-wrapper">
      <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="video-info" id="videoInfo"><div class="loading">Loading video...</div></div>

    <!-- PDF Material Section -->
    <div id="pdfMaterial" class="pdf-material">
      <h3>📚 Course Materials</h3>
      <div id="pdfContent"></div>
    </div>
  </div>
  <div class="playlist-section">
    <h3>Course Content</h3>
    <div id="playlist"><div class="loading">Loading playlist...</div></div>
  </div>
</div>

<script>
  const API_BASE = '/api';
  const token = localStorage.getItem('token');

  if (!token) window.location.href = 'index.html';

  document.getElementById('logoutBtn').onclick = () => {
    localStorage.clear();
    window.location.href = 'index.html';
  };

  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get('courseId');
  let videos = [];

  function extractYouTubeId(url) {
    if (!url) return null;
    if (url.match(/^[a-zA-Z0-9_-]{11}$/)) return url;
    if (url.includes("youtu.be/")) return url.substring(url.lastIndexOf("/") + 1);
    if (url.includes("youtube.com/watch?v=")) {
      let parts = url.split("v=");
      if (parts.length > 1) {
        let id = parts[1];
        if (id.includes("&")) id = id.substring(0, id.indexOf("&"));
        return id;
      }
    }
    if (url.includes("youtube.com/embed/")) return url.substring(url.lastIndexOf("/") + 1);
    return url;
  }

  function formatDuration(seconds) {
    if (!seconds) return 'Duration not available';
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function loadCourse() {
    try {
      const videosResponse = await fetch(`${API_BASE}/courses/${courseId}/videos`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!videosResponse.ok) throw new Error('Failed to load videos');
      videos = await videosResponse.json();
      if (!videos || videos.length === 0) {
        document.getElementById('playlist').innerHTML = '<div class="loading">No videos in this course.</div>';
        return;
      }
      loadPlaylist();
      loadVideo(0);
      await loadPdfMaterial();
    } catch (error) {
      console.error('Error:', error);
    }
  }

  function loadPlaylist() {
    const playlistDiv = document.getElementById('playlist');
    playlistDiv.innerHTML = videos.map((video, index) => `
                <div class="playlist-item" onclick="loadVideo(${index})">
                    <div class="playlist-thumb">🎬</div>
                    <div class="playlist-info">
                        <div class="playlist-title">${escapeHtml(video.title)}</div>
                        <div class="playlist-duration">⏱️ ${formatDuration(video.duration)}</div>
                    </div>
                </div>
            `).join('');
  }

  function loadVideo(index) {
    const video = videos[index];
    if (!video || !video.videoUrl) return;
    const youtubeId = extractYouTubeId(video.videoUrl);
    const embedUrl = `https://www.youtube.com/embed/${youtubeId}?enablejsapi=1`;
    document.getElementById('youtubePlayer').src = embedUrl;
    document.getElementById('videoInfo').innerHTML = `
                <h2>${escapeHtml(video.title)}</h2>
                <p>${escapeHtml(video.description) || 'No description'}</p>
                <div style="background:#667eea; color:white; padding:5px 10px; border-radius:5px; display:inline-block;">⏱️ ${formatDuration(video.duration)}</div>
            `;
    document.querySelectorAll('.playlist-item').forEach((item, i) => {
      item.classList.toggle('active', i === index);
    });
  }

  async function loadPdfMaterial() {
    try {
      const response = await fetch(`${API_BASE}/courses/public/${courseId}`);
      const course = await response.json();
      if (course.pdfUrl && course.pdfUrl !== '') {
        const pdfDiv = document.getElementById('pdfMaterial');
        const pdfContent = document.getElementById('pdfContent');
        const fileSizeMB = course.pdfSize ? (course.pdfSize / 1024 / 1024).toFixed(2) : '';
        pdfContent.innerHTML = `
                        <div style="background: white; padding: 15px; border-radius: 10px; border-left: 4px solid #ffc107;">
                            <strong>📖 ${escapeHtml(course.pdfTitle || 'Course Material')}</strong><br>
                            <small>PDF Document ${fileSizeMB ? `(${fileSizeMB} MB)` : ''}</small>
                            <p style="margin: 10px 0;">Download this PDF guide to follow along with the course.</p>
                            <a href="${course.pdfUrl}" target="_blank" class="btn-secondary" style="display: inline-block; padding: 8px 20px; background: #28a745; text-decoration: none; color: white; border-radius: 5px;">📥 Download PDF</a>
                        </div>
                    `;
        pdfDiv.style.display = 'block';
      }
    } catch (error) {
      console.error('Error loading PDF:', error);
    }
  }

  loadCourse();
</script>
</body>
</html>
