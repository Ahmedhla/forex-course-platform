<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Course Player - Forex Academy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Navbar */
    .navbar {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 1rem 0;
    }
    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
    }
    .nav-links a:hover {
      color: #ffd700;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      background: none;
      border: none;
      padding: 10px;
    }
    .hamburger span {
      width: 25px;
      height: 3px;
      background: white;
      margin: 3px 0;
      transition: 0.3s;
      border-radius: 2px;
    }
    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
    }
    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }
    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* Mobile Menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      z-index: 999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }
    .mobile-menu a {
      color: white;
      text-decoration: none;
      font-size: 1.5rem;
      padding: 15px;
    }
    .close-menu {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      background: none;
      border: none;
    }

    /* Player */
    .player-container {
      display: flex;
      max-width: 1400px;
      margin: 20px auto;
      gap: 20px;
      padding: 0 20px;
    }
    .video-section {
      flex: 2;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      background: black;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-info {
      margin-top: 15px;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }
    .playlist-section {
      flex: 1;
      background: white;
      border-radius: 10px;
      padding: 20px;
      max-height: 600px;
      overflow-y: auto;
    }
    .playlist-item {
      display: flex;
      padding: 12px;
      margin: 10px 0;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .playlist-item:hover {
      background: #e8e8e8;
    }
    .playlist-item.active {
      background: #667eea;
      color: white;
    }
    .playlist-thumb {
      width: 50px;
      height: 50px;
      background: #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 24px;
    }
    .playlist-info {
      flex: 1;
    }
    .playlist-title {
      font-weight: bold;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .hamburger {
        display: flex;
      }
      .player-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="logo">📈 ForexAcademy</div>
    <div class="nav-links">
      <a href="dashboard.html">My Courses</a>
      <a href="index.html">Home</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
    <button class="hamburger" id="hamburgerBtn">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="close-menu" id="closeMenuBtn">&times;</button>
  <a href="dashboard.html">My Courses</a>
  <a href="index.html">Home</a>
  <a href="#" id="mobileLogoutBtn">Logout</a>
</div>

<div class="player-container">
  <div class="video-section">
    <div class="video-wrapper">
      <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="video-info" id="videoInfo"><div class="loading">Loading video...</div></div>
  </div>
  <div class="playlist-section">
    <h3>Course Content</h3>
    <div id="playlist"><div class="loading">Loading playlist...</div></div>
  </div>
</div>

<script>
  const API_BASE = '/api';
  const token = localStorage.getItem('token');

  if (!token) window.location.href = 'index.html';

  // Hamburger menu
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  const closeMenuBtn = document.getElementById('closeMenuBtn');

  function closeMobileMenu() {
    if (hamburgerBtn) hamburgerBtn.classList.remove('active');
    if (mobileMenu) mobileMenu.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function openMobileMenu() {
    if (hamburgerBtn) hamburgerBtn.classList.add('active');
    if (mobileMenu) mobileMenu.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  if (hamburgerBtn) hamburgerBtn.addEventListener('click', openMobileMenu);
  if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMobileMenu);
  if (mobileMenu) {
    mobileMenu.addEventListener('click', (e) => {
      if (e.target === mobileMenu) closeMobileMenu();
    });
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', closeMobileMenu);
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }

  document.getElementById('logoutBtn').onclick = logout;
  const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
  if (mobileLogoutBtn) mobileLogoutBtn.onclick = logout;

  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get('courseId');
  let videos = [];

  function extractYouTubeId(url) {
    if (!url) return null;
    if (url.match(/^[a-zA-Z0-9_-]{11}$/)) return url;
    if (url.includes("youtu.be/")) return url.substring(url.lastIndexOf("/") + 1);
    if (url.includes("youtube.com/watch?v=")) {
      let parts = url.split("v=");
      if (parts.length > 1) {
        let id = parts[1];
        if (id.includes("&")) id = id.substring(0, id.indexOf("&"));
        return id;
      }
    }
    if (url.includes("youtube.com/embed/")) return url.substring(url.lastIndexOf("/") + 1);
    return url;
  }

  function formatDuration(seconds) {
    if (!seconds) return 'Duration not available';
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
  }

  async function loadCourse() {
    try {
      const videosResponse = await fetch(`${API_BASE}/courses/${courseId}/videos`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!videosResponse.ok) throw new Error('Failed to load videos');
      videos = await videosResponse.json();

      if (!videos || videos.length === 0) {
        document.getElementById('playlist').innerHTML = '<div class="loading">No videos in this course.</div>';
        return;
      }

      loadPlaylist();
      loadVideo(0);
    } catch (error) {
      console.error('Error:', error);
    }
  }

  function loadPlaylist() {
    const playlistDiv = document.getElementById('playlist');
    playlistDiv.innerHTML = videos.map((video, index) => `
                <div class="playlist-item" onclick="loadVideo(${index})">
                    <div class="playlist-thumb">🎬</div>
                    <div class="playlist-info">
                        <div class="playlist-title">${escapeHtml(video.title)}</div>
                        <div class="playlist-duration">⏱️ ${formatDuration(video.duration)}</div>
                    </div>
                </div>
            `).join('');
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function loadVideo(index) {
    const video = videos[index];
    if (!video || !video.videoUrl) return;

    const youtubeId = extractYouTubeId(video.videoUrl);
    const embedUrl = `https://www.youtube.com/embed/${youtubeId}?enablejsapi=1`;
    document.getElementById('youtubePlayer').src = embedUrl;

    document.getElementById('videoInfo').innerHTML = `
                <h2>${escapeHtml(video.title)}</h2>
                <p>${escapeHtml(video.description) || 'No description'}</p>
                <div style="background:#667eea; color:white; padding:5px 10px; border-radius:5px; display:inline-block;">⏱️ ${formatDuration(video.duration)}</div>
            `;

    document.querySelectorAll('.playlist-item').forEach((item, i) => {
      item.classList.toggle('active', i === index);
    });
  }

  loadCourse();
</script>
</body>
</html>
