<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Player - Forex Academy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    .navbar {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 1rem 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 2rem;
    }
    .nav-links a:hover {
      color: #ffd700;
    }
    .player-container {
      display: flex;
      max-width: 1400px;
      margin: 20px auto;
      gap: 20px;
      padding: 0 20px;
    }
    .video-section {
      flex: 2;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      background: black;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-info {
      margin-top: 15px;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }
    .playlist-section {
      flex: 1;
      background: white;
      border-radius: 10px;
      padding: 20px;
      height: fit-content;
      max-height: 600px;
      overflow-y: auto;
    }
    .playlist-section h3 {
      margin-bottom: 15px;
      color: #333;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }
    .playlist-item {
      display: flex;
      padding: 12px;
      margin: 10px 0;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .playlist-item:hover {
      background: #e8e8e8;
      transform: translateX(5px);
    }
    .playlist-item.active {
      background: #667eea;
      color: white;
    }
    .playlist-thumb {
      width: 50px;
      height: 50px;
      background: #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 24px;
    }
    .playlist-info {
      flex: 1;
    }
    .playlist-title {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .playlist-duration {
      font-size: 0.75rem;
      color: #888;
    }
    .playlist-item.active .playlist-duration {
      color: #ddd;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .error-message {
      text-align: center;
      padding: 40px;
      color: red;
    }
    @media (max-width: 768px) {
      .player-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="logo">📈 ForexAcademy</div>
    <div class="nav-links">
      <a href="dashboard.html">My Courses</a>
      <a href="index.html">Home</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>
</nav>

<div class="player-container">
  <div class="video-section">
    <div class="video-wrapper">
      <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="video-info" id="videoInfo">
      <div class="loading">Loading video...</div>
    </div>
  </div>

  <div class="playlist-section">
    <h3>📋 Course Content</h3>
    <div id="playlist">
      <div class="loading">Loading playlist...</div>
    </div>
  </div>
</div>

<script>
  const API_BASE = '/api';
  const token = localStorage.getItem('token');

  // Check if user is logged in
  if (!token) {
    window.location.href = 'index.html';
  }

  // Logout function
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.clear();
    window.location.href = 'index.html';
  };

  // Get course ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get('courseId');

  console.log('Course Player Loading - Course ID:', courseId);

  if (!courseId) {
    alert('No course selected. Redirecting to dashboard...');
    window.location.href = 'dashboard.html';
  }

  let videos = [];
  let currentVideoIndex = 0;

  // Extract YouTube ID from URL
  function extractYouTubeId(url) {
    if (!url) return null;

    // If it's already just an ID (11 characters)
    if (url.match(/^[a-zA-Z0-9_-]{11}$/)) {
      return url;
    }

    // Handle youtu.be format
    if (url.includes("youtu.be/")) {
      return url.substring(url.lastIndexOf("/") + 1);
    }

    // Handle youtube.com/watch?v= format
    if (url.includes("youtube.com/watch?v=")) {
      let parts = url.split("v=");
      if (parts.length > 1) {
        let id = parts[1];
        if (id.includes("&")) {
          id = id.substring(0, id.indexOf("&"));
        }
        return id;
      }
    }

    // Handle youtube.com/embed/ format
    if (url.includes("youtube.com/embed/")) {
      return url.substring(url.lastIndexOf("/") + 1);
    }

    return url;
  }

  // Format duration
  function formatDuration(seconds) {
    if (!seconds || seconds === 0) return 'Duration not available';
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
  }

  // Escape HTML
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Load course and videos
  async function loadCourse() {
    try {
      console.log('Loading course ID:', courseId);

      // Get course details
      const courseResponse = await fetch(`${API_BASE}/courses/public/${courseId}`);
      if (!courseResponse.ok) throw new Error('Course not found');
      const course = await courseResponse.json();
      document.title = `${course.title} - Forex Academy`;

      // Get videos for this course
      const videosResponse = await fetch(`${API_BASE}/courses/${courseId}/videos`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!videosResponse.ok) throw new Error('Failed to load videos');

      videos = await videosResponse.json();
      console.log('Loaded videos:', videos);

      if (!videos || videos.length === 0) {
        document.getElementById('playlist').innerHTML = '<div class="error-message">📹 No videos in this course yet.</div>';
        document.getElementById('videoInfo').innerHTML = '<div class="error-message">No videos available</div>';
        return;
      }

      loadPlaylist();
      loadVideo(0);

    } catch (error) {
      console.error('Error loading course:', error);
      document.getElementById('playlist').innerHTML = '<div class="error-message">❌ Error loading course</div>';
      document.getElementById('videoInfo').innerHTML = '<div class="error-message">❌ Error loading course details</div>';
    }
  }

  // Load playlist
  function loadPlaylist() {
    const playlistDiv = document.getElementById('playlist');
    playlistDiv.innerHTML = videos.map((video, index) => `
                <div class="playlist-item" onclick="loadVideo(${index})" data-video-id="${video.id}">
                    <div class="playlist-thumb">🎬</div>
                    <div class="playlist-info">
                        <div class="playlist-title">${escapeHtml(video.title)}</div>
                        <div class="playlist-duration">⏱️ ${formatDuration(video.duration)}</div>
                    </div>
                </div>
            `).join('');
  }

  // Load specific video
  function loadVideo(index) {
    currentVideoIndex = index;
    const video = videos[index];

    if (!video || !video.videoUrl) {
      document.getElementById('videoInfo').innerHTML = '<div class="error-message">❌ Invalid video data</div>';
      return;
    }

    const youtubeId = extractYouTubeId(video.videoUrl);
    const embedUrl = `https://www.youtube.com/embed/${youtubeId}?enablejsapi=1`;

    console.log('Playing YouTube video:', embedUrl);

    const iframe = document.getElementById('youtubePlayer');
    iframe.src = embedUrl;

    document.getElementById('videoInfo').innerHTML = `
                <h2>${escapeHtml(video.title)}</h2>
                <p>${escapeHtml(video.description) || 'No description available'}</p>
                <div style="display: inline-block; background: #667eea; color: white; padding: 5px 10px; border-radius: 5px; margin-top: 10px;">
                    ⏱️ Duration: ${formatDuration(video.duration)}
                </div>
            `;

    // Update active state in playlist
    document.querySelectorAll('.playlist-item').forEach((item, i) => {
      if (i === index) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });

    localStorage.setItem(`lastVideo_${courseId}`, video.id);
  }

  // Start loading the course
  loadCourse();
</script>
</body>
</html>
