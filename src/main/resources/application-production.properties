# Production Database Configuration (will be replaced with cloud DB URL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload Paths (will use cloud storage or persistent volume)
video.upload.path=${VIDEO_UPLOAD_PATH:./uploads/videos/}
thumbnail.upload.path=${THUMBNAIL_UPLOAD_PATH:./uploads/thumbnails/}

# File Upload Limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Production specific
server.port=${PORT:8080}
server.error.whitelabel.enabled=false
spring.main.banner-mode=off