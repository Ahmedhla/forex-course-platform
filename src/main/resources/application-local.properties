# Local development with H2 Database
spring.datasource.url=jdbc:h2:file:./data/forexdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=MySuperSecretKeyForJWT2024ForexPlatform!@#$%^
jwt.expiration=86400000

# File Upload
video.upload.path=./uploads/videos/
thumbnail.upload.path=./uploads/thumbnails/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

server.port=8080